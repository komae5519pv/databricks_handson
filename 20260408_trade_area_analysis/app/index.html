        };

        // 全店舗マップコンポーネント（健康度ヒートマップ）
        const AllStoresMap = ({ stores, onStoreClick, healthFilter }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef([]);

            useEffect(() => {
                if (!mapRef.current || !stores || stores.length === 0) return;

                // 既存のマップがあれば削除
                if (mapInstanceRef.current) {
                    mapInstanceRef.current.remove();
                    mapInstanceRef.current = null;
                }

                // 店舗の中心を計算
                const validStores = stores.filter(s => s.latitude && s.longitude);
                if (validStores.length === 0) return;

                const avgLat = validStores.reduce((sum, s) => sum + s.latitude, 0) / validStores.length;
                const avgLng = validStores.reduce((sum, s) => sum + s.longitude, 0) / validStores.length;

                const map = L.map(mapRef.current, {
                    zoomControl: true,
                    attributionControl: false
                }).setView([avgLat, avgLng], 6);

                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: ''
                }).addTo(map);

                mapInstanceRef.current = map;
                setTimeout(() => map.invalidateSize(), 100);

                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, [stores]);

            // マーカーをフィルタに応じて更新
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map || !stores) return;

                // 既存のマーカーを削除
                markersRef.current.forEach(m => map.removeLayer(m));
                markersRef.current = [];

                const validStores = stores.filter(s => s.latitude && s.longitude);

                validStores.forEach(store => {
                    const health = calculateHealth(store.yoy_change);
                    const colors = { emerald: '#10b981', amber: '#f59e0b', red: '#ef4444' };
                    const color = colors[health.color];

                    // フィルタが設定されている場合、該当しないマーカーは薄く表示
                    const isFiltered = healthFilter && health.status !== healthFilter;
                    const opacity = isFiltered ? 0.15 : 1;
                    const size = isFiltered ? 10 : 16;

                    const icon = L.divIcon({
                        className: 'custom-marker',
                        html: `<div style="background:${color}; width:${size}px; height:${size}px; border-radius:50%; border:2px solid white; box-shadow:0 2px 6px rgba(0,0,0,0.3); cursor:pointer; opacity:${opacity};"></div>`,
                        iconSize: [size, size],
                        iconAnchor: [size/2, size/2]
                    });

                    const marker = L.marker([store.latitude, store.longitude], { icon }).addTo(map);
                    marker.bindPopup(`
                        <div style="font-family:sans-serif; min-width:140px;">
                            <b style="color:${color}; font-size:13px;">${store.store_name}</b>
                            <div style="margin-top:4px; font-size:11px; color:#666;">
                                <div>${store.prefecture} ${store.city}</div>
                                <div>前年比: <b style="color:${color}">${(store.yoy_change * 100).toFixed(1)}%</b></div>
                            </div>
                        </div>
                    `);
                    marker.on('click', () => onStoreClick && onStoreClick(store));
                    marker.on('mouseover', function() { this.openPopup(); });
                    markersRef.current.push(marker);
                });
            }, [stores, healthFilter, onStoreClick]);

            return <div ref={mapRef} className="w-full h-full rounded-lg" />;
        };

        // Genie チャットコンポーネント
        const GenieChat = function(props) {
            const storeContext = props.storeContext;
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [conversationId, setConversationId] = useState(null);
            const chartRefs = useRef({});

            // マークダウンをパースする（グローバル関数を使用）
            var parseMarkdown = function(text) {
                if (!text) return '';
                if (typeof window.safeMarkdownParse === 'function') {
                    return window.safeMarkdownParse(String(text));
                }
                return String(text).replace(/\n/g, '<br>');
            };

            // 店舗が変わったら会話をリセット
            useEffect(function() {
                setMessages([]);
                setConversationId(null);
                // チャートインスタンスをクリア
                Object.values(chartRefs.current).forEach(function(chart) {
                    if (chart) chart.destroy();
                });
                chartRefs.current = {};
            }, [storeContext ? storeContext.store_id : null]);

            // メッセージが更新されたらチャートを描画
            useEffect(function() {
                messages.forEach(function(msg, idx) {
                    if (msg.chartData && !chartRefs.current['chart-' + idx]) {
                        var canvas = document.getElementById('genie-chart-' + idx);
                        if (canvas && window.Chart) {
                            var ctx = canvas.getContext('2d');
                            chartRefs.current['chart-' + idx] = new window.Chart(ctx, {
                                type: msg.chartData.type || 'line',
                                data: msg.chartData.data,
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: {
                                            display: true,
                                            labels: { color: 'rgba(255,255,255,0.8)', font: { size: 11 } }
                                        }
                                    },
                                    scales: {
                                        x: {
                                            ticks: { color: 'rgba(255,255,255,0.6)', font: { size: 10 } },
                                            grid: { color: 'rgba(255,255,255,0.1)' }
                                        },
                                        y: {
                                            ticks: { color: 'rgba(255,255,255,0.6)', font: { size: 10 } },
                                            grid: { color: 'rgba(255,255,255,0.1)' }
                                        }
                                    }
                                }
                            });
                        }
                    }
                });
            }, [messages]);

            const sendMessage = function() {
                if (!input.trim() || loading) return;

                const userMessage = input.trim();
                setInput('');
                setMessages(function(prev) { return prev.concat([{ role: 'user', content: userMessage }]); });
                setLoading(true);

                fetch('/api/genie/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: userMessage,
                        conversation_id: conversationId,
                        store_context: storeContext
                    })
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    console.log('[GenieChat] Response:', data);
                    if (data.success) {
                        setConversationId(data.conversation_id);
                        var responseText = data.text_response || data.description || '';

                        // クエリ結果があれば追加（HTMLテーブル形式）
                        if (data.data && data.columns && data.data.length > 0) {
                            // 数値フォーマット関数
                            var formatValue = function(v) {
                                if (v == null || v === '') return '';
                                var str = String(v);
                                // 科学記法を検出（例: 4.471530158E7）
                                if (/^-?\d+\.?\d*[eE][+-]?\d+$/.test(str)) {
                                    var num = parseFloat(str);
                                    if (!isNaN(num)) {
                                        // 大きな数値はカンマ区切り
                                        if (Math.abs(num) >= 1000) {
                                            return Math.round(num).toLocaleString('ja-JP');
                                        }
                                        return num.toFixed(2);
                                    }
                                }
                                // 通常の数値（整数）
                                if (/^-?\d+$/.test(str) && str.length > 4) {
                                    return parseInt(str).toLocaleString('ja-JP');
                                }
                                // 通常の数値（小数）
                                if (/^-?\d+\.\d+$/.test(str)) {
                                    var num = parseFloat(str);
                                    if (Math.abs(num) >= 1000) {
                                        return Math.round(num).toLocaleString('ja-JP');
                                    }
                                    return num.toFixed(2);
                                }
                                return str;
                            };

                            responseText += '\n\n**クエリ結果:**\n\n';
                            responseText += '<table><thead><tr>';
                            data.columns.forEach(function(col) {
                                responseText += '<th>' + col + '</th>';
                            });
                            responseText += '</tr></thead><tbody>';
                            data.data.slice(0, 10).forEach(function(row) {
                                responseText += '<tr>';
                                row.forEach(function(v) {
                                    responseText += '<td>' + formatValue(v) + '</td>';
                                });
                                responseText += '</tr>';
                            });
                            responseText += '</tbody></table>';
                            if (data.data.length > 10) {
                                responseText += '\n\n_（' + data.data.length + '件中10件を表示）_';
                            }

                            // チャートデータを生成（時系列or数値データがある場合）
                            var chartData = null;
                            var dateColIdx = -1;
                            var numericColIdxs = [];

                            // 日付カラムと数値カラムを検出
                            data.columns.forEach(function(col, idx) {
                                var colLower = col.toLowerCase();
                                if (colLower.includes('month') || colLower.includes('date') || colLower.includes('year') || colLower === '月') {
                                    dateColIdx = idx;
                                }
                                // 数値カラムを検出（amount, sales, count, 売上など）
                                if (colLower.includes('amount') || colLower.includes('sales') || colLower.includes('count') ||
                                    colLower.includes('売上') || colLower.includes('金額')) {
                                    numericColIdxs.push(idx);
                                }
                            });

                            // 日付カラムがなければ最初のカラムをラベルとして使用
                            if (dateColIdx === -1 && data.columns.length > 1) {
                                dateColIdx = 0;
                            }
                            // 数値カラムがなければ2番目以降の数値っぽいカラムを探す
                            if (numericColIdxs.length === 0 && data.data.length > 0) {
                                data.columns.forEach(function(col, idx) {
                                    if (idx !== dateColIdx) {
                                        var sampleVal = data.data[0][idx];
                                        if (sampleVal && /^-?\d+\.?\d*([eE][+-]?\d+)?$/.test(String(sampleVal))) {
                                            numericColIdxs.push(idx);
                                        }
                                    }
                                });
                            }

                            // チャートデータを構築（最大2系列まで）
                            if (dateColIdx >= 0 && numericColIdxs.length > 0) {
                                var labels = data.data.map(function(row) {
                                    var val = row[dateColIdx];
                                    // 日付フォーマット簡略化
                                    if (val && val.length === 10 && val.includes('-')) {
                                        return val.substring(0, 7); // YYYY-MM
                                    }
                                    return val;
                                });
                                var datasets = [];
                                var colors = ['#10b981', '#3b82f6', '#f59e0b'];
                                numericColIdxs.slice(0, 2).forEach(function(colIdx, i) {
                                    datasets.push({
                                        label: data.columns[colIdx],
                                        data: data.data.map(function(row) {
                                            var val = row[colIdx];
                                            return val ? parseFloat(val) : 0;
                                        }),
                                        borderColor: colors[i],
                                        backgroundColor: colors[i] + '33',
                                        fill: i === 0,
                                        tension: 0.3
                                    });
                                });
                                chartData = { type: 'line', data: { labels: labels, datasets: datasets } };
                            }
                        }

                        if (!responseText) {
                            responseText = 'ステータス: ' + data.status;
                        }

                        var msgObj = { role: 'assistant', content: responseText };
                        if (chartData) {
                            msgObj.chartData = chartData;
                        }
                        setMessages(function(prev) { return prev.concat([msgObj]); });
                    } else {
                        var errorMsg = data.error || 'エラーが発生しました';
                        setMessages(function(prev) { return prev.concat([{ role: 'assistant', content: '❌ ' + errorMsg, error: true }]); });
                    }
                })
                .catch(function(err) {
                    console.error('[GenieChat] Error:', err);
                    setMessages(function(prev) { return prev.concat([{ role: 'assistant', content: '❌ 通信エラー: ' + err.message, error: true }]); });
                })
                .finally(function() {
                    setLoading(false);
                });
            };

            var suggestedQuestions = [
                'この店舗の売上傾向を教えて',
                '近隣競合店との比較は？',
                '全店舗数は？'
            ];

            return (
                <div className="flex flex-col h-full">
                    <div className="flex items-center gap-2 mb-3">
                        <span className="text-lg">🤖</span>
                        <span className="font-semibold">商圏分析Genieチャット</span>
                        <span className="text-xs text-white/40 ml-auto">Powered by Genie</span>
                    </div>

                    <div className="flex-1 overflow-y-auto space-y-3 mb-3 min-h-0" style={{ minHeight: '180px', maxHeight: '400px' }}>
                        {messages.length === 0 ? (
                            <div className="text-center py-4">
                                <div className="text-white/50 text-sm mb-3">質問を入力するか、下のボタンから選んでください</div>
                                <div className="flex flex-wrap gap-2 justify-center">
                                    {suggestedQuestions.map(function(q, i) {
                                        return (
                                            <button
                                                key={i}
                                                onClick={function() { setInput(q); }}
                                                className="px-3 py-1.5 bg-white/10 hover:bg-emerald-500/20 rounded-full text-xs text-white/70 hover:text-emerald-400 transition-colors"
                                            >
                                                {q}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            messages.map(function(msg, i) {
                                return (
                                    <div key={i} className={'flex ' + (msg.role === 'user' ? 'justify-end' : 'justify-start')}>
                                        <div className={'max-w-[85%] px-3 py-2 rounded-lg text-sm ' + (
                                            msg.role === 'user'
                                                ? 'bg-emerald-500/20 text-emerald-100'
                                                : msg.error
                                                    ? 'bg-red-500/20 text-red-200'
                                                    : 'bg-white/10 text-white/90'
                                        )}>
                                            {msg.role === 'user' ? (
                                                <div className="whitespace-pre-wrap">{msg.content}</div>
                                            ) : (
                                                <div>
                                                    <div className="genie-response" dangerouslySetInnerHTML={{ __html: parseMarkdown(msg.content) }} />
                                                    {msg.chartData && (
                                                        <div className="mt-3 p-3 bg-black/30 rounded-lg">
                                                            <div className="text-xs text-white/50 mb-2">📊 データ可視化</div>
                                                            <div style={{ height: '200px' }}>
                                                                <canvas id={'genie-chart-' + i}></canvas>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })
                        )}
                        {loading && (
                            <div className="flex justify-start">
                                <div className="bg-white/10 px-3 py-2 rounded-lg text-sm flex items-center gap-2">
                                    <div className="spinner w-4 h-4 border-2 border-emerald-500 border-t-transparent rounded-full" />
                                    <span className="text-white/50">分析中...</span>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="flex gap-2">
                        <input
                            type="text"
                            value={input}
                            onChange={function(e) { setInput(e.target.value); }}
                            onKeyDown={function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                            placeholder="店舗について質問..."
                            disabled={loading}
                            className="flex-1 bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm placeholder-white/30 focus:outline-none focus:border-emerald-500/50 disabled:opacity-50"
                        />
                        <button
                            onClick={sendMessage}
                            disabled={loading || !input.trim()}
                            className="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 disabled:bg-emerald-500/30 disabled:cursor-not-allowed rounded-lg text-sm font-medium transition-colors flex items-center gap-1"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                            </svg>
                            送信
                        </button>
                    </div>
                </div>
            );
        };

        // 事業全体ダッシュボードコンポーネント
        const BusinessOverviewDashboard = ({ data, stores, onStoreClick, onSwitchToStore, chartFilter, onFilterChange }) => {
            // チャートツールチップ
            const [chartTooltip, setChartTooltip] = useState(null);

            if (!data) {
                return (
                    <div className="flex-1 flex items-center justify-center">
                        <div className="spinner w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full" />
                    </div>
                );
            }

            const kpi = data.kpi || {};
            const healthDist = data.health_distribution || {};
            const trend = data.monthly_trend || [];
            const topStores = data.top_stores || [];
            const worstStores = data.worst_stores || [];
            const regions = data.regional_breakdown || [];

            // フィルターラベル取得
            const getFilterLabel = () => {
                if (!chartFilter || !chartFilter.value) return null;
                if (chartFilter.type === 'health') {
                    const labels = { healthy: '良好店舗', caution: '要注意店舗', critical: '要治療店舗' };
                    return labels[chartFilter.value];
                }
                if (chartFilter.type === 'prefecture') return chartFilter.value;
                if (chartFilter.type === 'store') {
                    const store = stores.find(s => s.store_id === chartFilter.value);
                    return store?.store_name || chartFilter.value;
                }
                return null;
            };

            // フィルタートグル
            const toggleFilter = (type, value) => {
                if (chartFilter?.type === type && chartFilter?.value === value) {
                    onFilterChange({ type: null, value: null });
                } else {
                    onFilterChange({ type, value });
                }
            };

            return (
                <div className="h-full overflow-y-auto p-5 space-y-4">
                    {/* KPIカード行 */}
                    <div className="grid grid-cols-5 gap-3">
                        <div className="card p-4 rounded-xl">
                            <div className="text-white/50 text-xs mb-1">全店売上</div>
                            <div className="text-2xl font-bold text-emerald-400">{kpi.total_sales_oku?.toFixed(1)}<span className="text-sm font-normal text-white/50 ml-1">億円</span></div>
                        </div>
                        <div className="card p-4 rounded-xl">
                            <div className="text-white/50 text-xs mb-1">平均前年比</div>
                            <div className={`text-2xl font-bold ${kpi.avg_yoy_pct >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                {kpi.avg_yoy_pct >= 0 ? '+' : ''}{kpi.avg_yoy_pct?.toFixed(1)}%
                            </div>
                        </div>
                        <div
                            className={`card p-4 rounded-xl border-l-4 border-emerald-500 cursor-pointer transition-all hover:bg-emerald-500/10 ${chartFilter?.type === 'health' && chartFilter?.value === 'healthy' ? 'ring-2 ring-emerald-500 bg-emerald-500/20' : ''}`}
                            onClick={() => toggleFilter('health', 'healthy')}
                        >
                            <div className="text-white/50 text-xs mb-1">✅ 良好</div>
                            <div className="text-2xl font-bold text-emerald-400">{healthDist.healthy || 0}<span className="text-sm font-normal text-white/50 ml-1">店舗</span></div>
                        </div>
                        <div
                            className={`card p-4 rounded-xl border-l-4 border-amber-500 cursor-pointer transition-all hover:bg-amber-500/10 ${chartFilter?.type === 'health' && chartFilter?.value === 'caution' ? 'ring-2 ring-amber-500 bg-amber-500/20' : ''}`}
                            onClick={() => toggleFilter('health', 'caution')}
                        >
                            <div className="text-white/50 text-xs mb-1">⚠️ 要注意</div>
                            <div className="text-2xl font-bold text-amber-400">{healthDist.caution || 0}<span className="text-sm font-normal text-white/50 ml-1">店舗</span></div>
                        </div>
                        <div
                            className={`card p-4 rounded-xl border-l-4 border-red-500 cursor-pointer transition-all hover:bg-red-500/10 ${chartFilter?.type === 'health' && chartFilter?.value === 'critical' ? 'ring-2 ring-red-500 bg-red-500/20' : ''}`}
                            onClick={() => toggleFilter('health', 'critical')}
                        >
                            <div className="text-white/50 text-xs mb-1">🚨 要治療</div>
                            <div className="text-2xl font-bold text-red-400">{healthDist.critical || 0}<span className="text-sm font-normal text-white/50 ml-1">店舗</span></div>
                        </div>
                    </div>

                    {/* メインコンテンツ */}
                    <div className="grid grid-cols-12 gap-4" style={{ minHeight: '360px' }}>
                        {/* 左側: 月次推移 + ランキング */}
                        <div className="col-span-7 flex flex-col gap-4">
                            {/* 月次売上推移 */}
                            <div className="card p-4 rounded-xl flex-1">
                                <div className="text-white/70 text-sm font-medium mb-3 flex items-center gap-2">
                                    📈 月次売上推移
                                    {getFilterLabel() ? (
                                        <span className="px-2 py-0.5 bg-emerald-500/20 text-emerald-400 rounded-full text-xs flex items-center gap-1">
                                            {getFilterLabel()}
                                            <button
                                                onClick={() => onFilterChange({ type: null, value: null })}
                                                className="hover:text-white ml-1"
                                            >×</button>
                                        </span>
                                    ) : (
                                        <span className="text-white/40">（全店合計）</span>
                                    )}
                                </div>
                                <div className="h-44">
                                    {trend.length > 0 && (
                                        <svg width="100%" height="100%" viewBox="0 0 700 150" preserveAspectRatio="xMidYMid meet">
                                            <defs>
                                                <linearGradient id="businessGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                                    <stop offset="0%" stopColor="#10b981" stopOpacity="0.3" />
                                                    <stop offset="100%" stopColor="#10b981" stopOpacity="0" />
                                                </linearGradient>
                                            </defs>
                                            {(() => {
                                                const values = trend.map(d => d.sales_oku);
                                                const max = Math.max(...values) * 1.1;
                                                const min = Math.min(...values) * 0.9;
                                                const range = max - min || 1;
                                                const points = trend.map((d, i) => ({
                                                    x: (i / (trend.length - 1)) * 640 + 30,
                                                    y: 115 - ((d.sales_oku - min) / range) * 95,
                                                    ...d
                                                }));
                                                const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
                                                const areaD = pathD + ` L 670 115 L 30 115 Z`;
                                                return (
                                                    <>
                                                        <path d={areaD} fill="url(#businessGradient)" />
                                                        <path d={pathD} fill="none" stroke="#10b981" strokeWidth="2" />
                                                        {points.map((p, i) => (
                                                            <g key={i}>
                                                                <circle
                                                                    cx={p.x}
                                                                    cy={p.y}
                                                                    r="6"
                                                                    fill={p.yoy_pct >= 0 ? '#10b981' : '#ef4444'}
                                                                    stroke="white"
                                                                    strokeWidth="1.5"
                                                                    style={{ cursor: 'pointer' }}
                                                                    onMouseEnter={(e) => setChartTooltip({ x: e.clientX, y: e.clientY, data: p })}
                                                                    onMouseLeave={() => setChartTooltip(null)}
                                                                />
                                                                <text x={p.x} y="135" textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize="10">{p.month?.slice(5,7)}月</text>
                                                            </g>
                                                        ))}
                                                    </>
                                                );
                                            })()}
                                        </svg>
                                    )}
                                    {chartTooltip && createPortal(
                                        <div style={{
                                            position: 'fixed',
                                            left: chartTooltip.x + 15,
                                            top: chartTooltip.y - 10,
                                            transform: 'translateY(-100%)',
                                            background: 'rgba(15, 23, 42, 0.98)',
                                            border: '1px solid rgba(16, 185, 129, 0.5)',
                                            borderRadius: '8px',
                                            padding: '10px 12px',
                                            fontSize: '12px',
                                            color: 'white',
                                            boxShadow: '0 8px 32px rgba(0,0,0,0.6)',
                                            zIndex: 999999,
                                            minWidth: '160px',
                                            pointerEvents: 'none'
                                        }}>
                                            <div style={{ fontWeight: 600, marginBottom: '8px', color: '#10b981', borderBottom: '1px solid rgba(255,255,255,0.1)', paddingBottom: '6px' }}>
                                                📅 {chartTooltip.data.month}
                                            </div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '4px' }}>
                                                <span style={{ color: 'rgba(255,255,255,0.5)' }}>💰 全店売上</span>
                                                <span style={{ fontWeight: 600, color: '#10b981' }}>{chartTooltip.data.sales_oku?.toFixed(1)}億円</span>
                                            </div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                                <span style={{ color: 'rgba(255,255,255,0.5)' }}>📈 前年比</span>
                                                <span style={{ fontWeight: 500, color: chartTooltip.data.yoy_pct >= 0 ? '#10b981' : '#ef4444' }}>
                                                    {chartTooltip.data.yoy_pct >= 0 ? '+' : ''}{chartTooltip.data.yoy_pct?.toFixed(1)}%
                                                </span>
                                            </div>
                                        </div>,
                                        document.body
                                    )}
                                </div>
                            </div>

                            {/* ランキング */}
                            <div className="grid grid-cols-2 gap-4" style={{ maxHeight: '200px' }}>
                                {/* 売上成長ランキング */}
                                <div className="card p-3 rounded-xl flex flex-col" style={{ maxHeight: '200px' }}>
                                    <div className="text-white/70 text-sm font-medium mb-2 flex justify-between">
                                        <span>🏆 売上成長ランキング</span>
                                        <span className="text-white/40 text-xs">{topStores.length}店舗</span>
                                    </div>
                                    <div className="space-y-1 overflow-y-auto flex-1">
                                        {topStores.map((s, i) => (
                                            <div
                                                key={s.store_id}
                                                className={`flex items-center justify-between text-xs p-1.5 bg-white/5 rounded cursor-pointer hover:bg-emerald-500/20 transition-colors ${chartFilter?.type === 'store' && chartFilter?.value === s.store_id ? 'ring-1 ring-emerald-500 bg-emerald-500/30' : ''}`}
                                                onClick={() => toggleFilter('store', s.store_id)}
                                            >
                                                <div className="flex items-center gap-2">
                                                    <span className="w-5 text-center text-white/40">{i + 1}</span>
                                                    <span className="truncate max-w-[100px]">{s.store_name}</span>
                                                </div>
                                                <span className="text-emerald-400 font-medium">+{s.yoy_pct?.toFixed(1)}%</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* 要改善ランキング */}
                                <div className="card p-3 rounded-xl flex flex-col" style={{ maxHeight: '200px' }}>
                                    <div className="text-white/70 text-sm font-medium mb-2 flex justify-between">
                                        <span>⚠️ 要改善ランキング</span>
                                        <span className="text-white/40 text-xs">{worstStores.length}店舗</span>
                                    </div>
                                    <div className="space-y-1 overflow-y-auto flex-1">
                                        {worstStores.map((s, i) => (
                                            <div
                                                key={s.store_id}
                                                className={`flex items-center justify-between text-xs p-1.5 bg-white/5 rounded cursor-pointer hover:bg-red-500/20 transition-colors ${chartFilter?.type === 'store' && chartFilter?.value === s.store_id ? 'ring-1 ring-red-500 bg-red-500/30' : ''}`}
                                                onClick={() => toggleFilter('store', s.store_id)}
                                            >
                                                <div className="flex items-center gap-2">
                                                    <span className="w-5 text-center text-white/40">{i + 1}</span>
                                                    <span className="truncate max-w-[100px]">{s.store_name}</span>
                                                </div>
                                                <span className="text-red-400 font-medium">{s.yoy_pct?.toFixed(1)}%</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 右側: 全店舗マップ */}
                        <div className="col-span-5 card p-4 rounded-xl flex flex-col">
                            <div className="flex justify-between items-center mb-2">
                                <div className="text-white/70 text-sm font-medium">
                                    🗺️ 全店舗ヒートマップ
                                    {chartFilter?.type === 'health' && chartFilter?.value && (
                                        <span className="ml-2 text-xs text-white/40">
                                            （{chartFilter.value === 'healthy' ? '良好' : chartFilter.value === 'caution' ? '要注意' : '要治療'}のみ表示中）
                                        </span>
                                    )}
                                </div>
                                <div className="flex items-center gap-2 text-xs">
                                    <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-emerald-500"></span>良好</span>
                                    <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-amber-500"></span>注意</span>
                                    <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-500"></span>要治療</span>
                                </div>
                            </div>
                            <div className="flex-1 rounded-lg overflow-hidden" style={{ minHeight: '280px' }}>
                                <AllStoresMap
                                    stores={stores}
                                    healthFilter={chartFilter?.type === 'health' ? chartFilter.value : null}
                                    onStoreClick={(store) => {
                                        toggleFilter('store', store.store_id);
                                    }}
                                />
                            </div>
                        </div>
                    </div>

                    {/* 地域別集計 */}
                    <div className="card p-4 rounded-xl">
                        <div className="text-white/70 text-sm font-medium mb-3">📊 地域別パフォーマンス</div>
                        <div className="grid grid-cols-6 gap-2">
                            {regions.slice(0, 12).map((r, i) => (
                                <div
                                    key={i}
                                    className={`p-2 bg-white/5 rounded text-center cursor-pointer transition-all hover:bg-white/10 ${chartFilter?.type === 'prefecture' && chartFilter?.value === r.prefecture ? 'ring-2 ring-blue-500 bg-blue-500/20' : ''}`}
                                    onClick={() => toggleFilter('prefecture', r.prefecture)}
                                >
                                    <div className="text-xs text-white/50 truncate">{r.prefecture}</div>
                                    <div className={`text-sm font-bold ${r.avg_yoy_pct >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                        {r.avg_yoy_pct >= 0 ? '+' : ''}{r.avg_yoy_pct?.toFixed(1)}%
                                    </div>
                                    <div className="text-xs text-white/40">{r.store_count}店舗</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [stores, setStores] = useState([]);
            const [selectedStore, setSelectedStore] = useState(null);
            const [overview, setOverview] = useState(null);
            const [analysisStatus, setAnalysisStatus] = useState(null);
            const [analysisResult, setAnalysisResult] = useState(null);
            const [loading, setLoading] = useState(true);
            const pollingRef = useRef(null);

            // ビューモード: 'business' = 事業全体, 'store' = 店舗別
            const [viewMode, setViewMode] = useState('business');
            const [businessOverview, setBusinessOverview] = useState(null);

            // 月次売上推移チャートのフィルター状態
            const [chartFilter, setChartFilter] = useState({ type: null, value: null });
            // type: 'health' | 'prefecture' | 'store', value: フィルター値

            // フィルタ状態
            const [statusFilter, setStatusFilter] = useState([]); // ['critical', 'caution', 'healthy']
            const [searchQuery, setSearchQuery] = useState('');
            const [prefectureFilter, setPrefectureFilter] = useState(''); // 県フィルタ
            const [cityFilter, setCityFilter] = useState(''); // 市フィルタ

            // 県・市のユニークリスト（動的生成）
            const prefectures = [...new Set(stores.map(s => s.prefecture).filter(Boolean))].sort();
            const cities = [...new Set(
                stores
                    .filter(s => !prefectureFilter || s.prefecture === prefectureFilter)
                    .map(s => s.city)
                    .filter(Boolean)
            )].sort();

            // フィルタされた店舗リスト
            const filteredStores = stores.filter(store => {
                const health = calculateHealth(store.yoy_change);
                // ステータスフィルタ
                if (statusFilter.length > 0 && !statusFilter.includes(health.status)) {
                    return false;
                }
                // 県フィルタ
                if (prefectureFilter && store.prefecture !== prefectureFilter) {
                    return false;
                }
                // 市フィルタ
                if (cityFilter && store.city !== cityFilter) {
                    return false;
                }
                // 検索フィルタ
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    const matchName = store.store_name?.toLowerCase().includes(query);
                    const matchCity = store.city?.toLowerCase().includes(query);
                    const matchPref = store.prefecture?.toLowerCase().includes(query);
                    if (!matchName && !matchCity && !matchPref) {
                        return false;
                    }
                }
                return true;
            });

            // 県が変更されたら市フィルタをリセット
            const handlePrefectureChange = (pref) => {
                setPrefectureFilter(pref);
                setCityFilter('');
            };

            // フィルタをすべてクリア
            const clearAllFilters = () => {
                setStatusFilter([]);
                setSearchQuery('');
                setPrefectureFilter('');
                setCityFilter('');
            };

            // アクティブなフィルタ数
            const activeFilterCount = statusFilter.length + (prefectureFilter ? 1 : 0) + (cityFilter ? 1 : 0) + (searchQuery ? 1 : 0);

            const toggleStatusFilter = (status) => {
                setStatusFilter(prev =>
                    prev.includes(status)
                        ? prev.filter(s => s !== status)
                        : [...prev, status]
                );
            };

            useEffect(() => { fetchStores(); }, []);

            // 事業全体データを取得（フィルター対応）
            const fetchBusinessOverview = async (healthFilter = null, prefFilter = null, storeFilter = null) => {
                try {
                    const params = new URLSearchParams();
                    if (healthFilter) params.append('health_filter', healthFilter);
                    if (prefFilter) params.append('prefecture_filter', prefFilter);
                    if (storeFilter) params.append('store_id_filter', storeFilter);
                    const url = '/api/business/overview' + (params.toString() ? '?' + params.toString() : '');
                    const res = await fetch(url);
                    const data = await res.json();
                    setBusinessOverview(data);
                } catch (err) {
                    console.error('Business overview fetch error:', err);
                }
            };

            // 事業全体データの初回ロード
            useEffect(() => {
                if (viewMode === 'business' && !businessOverview) {
                    fetchBusinessOverview();
                }
            }, [viewMode]);

            // フィルター変更時にデータ再取得
            useEffect(() => {
                if (viewMode !== 'business') return;
                if (chartFilter.type === null) return; // 初期状態はスキップ

                const { type, value } = chartFilter;
                if (value === null) {
                    // フィルタークリア時は全データ取得
                    fetchBusinessOverview();
                } else if (type === 'health') {
                    fetchBusinessOverview(value, null, null);
                } else if (type === 'prefecture') {
                    fetchBusinessOverview(null, value, null);
                } else if (type === 'store') {
                    fetchBusinessOverview(null, null, value);
                }
            }, [chartFilter]);

            useEffect(() => {
                if (selectedStore) {
                    setOverview(null);
                    setAnalysisResult(null);
                    fetchOverview(selectedStore.store_id);
                    checkAnalysisStatus(selectedStore.store_id);
                }
            }, [selectedStore]);

            useEffect(() => { return () => { if (pollingRef.current) clearInterval(pollingRef.current); }; }, []);

            const fetchStores = async () => {
                try {
                    const res = await fetch('/api/stores');
                    const data = await res.json();
                    setStores(data.stores || []);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            const fetchOverview = async (storeId) => {
                console.log('[DEBUG] Fetching overview for store:', storeId);
                try {
                    const res = await fetch(`/api/stores/${storeId}/overview`);
                    if (!res.ok) {
                        console.error('[DEBUG] Overview API error:', res.status);
                        setOverview({ error: true });
                        return;
                    }
                    const data = await res.json();
                    console.log('[DEBUG] Overview response:', data, 'keys:', Object.keys(data));
                    // データが空でもsetOverviewする（空オブジェクトでもローディングを解除）
                    setOverview(data && Object.keys(data).length > 0 ? data : { empty: true });
                } catch (err) {
                    console.error('[DEBUG] Overview fetch error:', err);
                    setOverview({ error: true });
                }
            };

            const checkAnalysisStatus = async (storeId) => {
                try {
                    const res = await fetch(`/api/analysis/${storeId}/status`);
                    const data = await res.json();
                    setAnalysisStatus(data);
                    if (data.status === 'completed') fetchAnalysisResult(storeId);
                    else if (data.status === 'running') startPolling(storeId);
                } catch (err) { console.error(err); }
            };

            const fetchAnalysisResult = async (storeId) => {
                try {
                    const res = await fetch(`/api/analysis/${storeId}/result`);
                    const data = await res.json();
                    setAnalysisResult(data);
                } catch (err) { console.error(err); }
            };

            const startAnalysis = async (forceRefresh = false) => {
                if (!selectedStore) return;
                try {
                    console.log('[Analysis] Starting analysis for:', selectedStore.store_id);
                    setAnalysisStatus({ status: 'running', progress: 0, current_phase: 'lv1' });
                    const res = await fetch('/api/analysis/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ store_id: selectedStore.store_id, force_refresh: forceRefresh })
                    });
                    const data = await res.json();
                    console.log('[Analysis] API response:', data);
                    if (data.status === 'running' || data.status === 'completed') {
                        setAnalysisStatus({ status: data.status, progress: 0, current_phase: data.current_phase || 'lv1' });
                        if (data.status === 'running') startPolling(selectedStore.store_id);
                        else fetchAnalysisResult(selectedStore.store_id);
                    } else {
                        console.error('[Analysis] Unexpected status:', data);
                        setAnalysisStatus({ status: 'failed', error: data.message || 'Unknown error' });
                    }
                } catch (err) {
                    console.error('[Analysis] Error:', err);
                    setAnalysisStatus({ status: 'failed', error: err.message });
                }
            };

            const startPolling = (storeId) => {
                if (pollingRef.current) clearInterval(pollingRef.current);
                pollingRef.current = setInterval(async () => {
                    try {
                        const res = await fetch(`/api/analysis/${storeId}/status`);
                        const data = await res.json();
                        setAnalysisStatus(data);
                        if (data.status === 'completed') {
                            clearInterval(pollingRef.current);
                            pollingRef.current = null;
                            fetchAnalysisResult(storeId);
                            fetchStores();
                        } else if (data.status === 'failed') {
                            clearInterval(pollingRef.current);
                            pollingRef.current = null;
                        }
                    } catch (err) { console.error(err); }
                }, 2000);
            };

            const health = selectedStore ? calculateHealth(selectedStore.yoy_change) : null;

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center">
                    <div className="spinner w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full" />
                </div>
            );

            return (
                <div className="h-screen flex overflow-hidden">
                    <div className="w-80 border-r border-white/10 flex flex-col h-full">
                        <div className="p-4 border-b border-white/10">
                            <h1 className="text-xl font-bold gradient-text">AI Store Doctor</h1>
                            <div className="text-sm text-white/50 mt-1">DCM商圏分析システム</div>
                            {/* ビューモードタブ */}
                            <div className="flex gap-2 mt-3">
                                <button
                                    onClick={() => setViewMode('business')}
                                    className={`flex-1 px-3 py-2 rounded-lg text-sm font-medium transition-all ${viewMode === 'business' ? 'bg-emerald-500 text-white' : 'bg-white/10 text-white/60 hover:bg-white/20'}`}
                                >
                                    📊 事業全体
                                </button>
                                <button
                                    onClick={() => setViewMode('store')}
                                    className={`flex-1 px-3 py-2 rounded-lg text-sm font-medium transition-all ${viewMode === 'store' ? 'bg-emerald-500 text-white' : 'bg-white/10 text-white/60 hover:bg-white/20'}`}
                                >
                                    🏪 店舗別
                                </button>
                            </div>
                        </div>

                        {/* フィルタセクション */}
                        <div className="p-3 border-b border-white/10 space-y-3">
                            {/* 地域フィルタ（県・市） */}
                            <div className="grid grid-cols-2 gap-2">
                                <select
                                    value={prefectureFilter}
                                    onChange={(e) => handlePrefectureChange(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-2 py-1.5 text-sm text-white/80 focus:outline-none focus:border-emerald-500/50 cursor-pointer"
                                    style={{ backgroundImage: 'none' }}
                                >
                                    <option value="" className="bg-gray-800">🗾 全ての県</option>
                                    {prefectures.map(pref => (
                                        <option key={pref} value={pref} className="bg-gray-800">{pref}</option>
                                    ))}
                                </select>
                                <select
                                    value={cityFilter}
                                    onChange={(e) => setCityFilter(e.target.value)}
                                    className="bg-white/5 border border-white/10 rounded-lg px-2 py-1.5 text-sm text-white/80 focus:outline-none focus:border-emerald-500/50 cursor-pointer"
                                    style={{ backgroundImage: 'none' }}
                                    disabled={!prefectureFilter && cities.length > 20}
                                >
                                    <option value="" className="bg-gray-800">🏙️ 全ての市</option>
                                    {cities.map(city => (
                                        <option key={city} value={city} className="bg-gray-800">{city}</option>
                                    ))}
                                </select>
                            </div>

                            {/* 検索ボックス */}
                            <div className="relative">
                                <input
                                    type="text"
                                    placeholder="店舗名で検索..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm placeholder-white/30 focus:outline-none focus:border-emerald-500/50"
                                />
                                {searchQuery && (
                                    <button onClick={() => setSearchQuery('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60">
                                        ✕
                                    </button>
                                )}
                            </div>

                            {/* ステータスフィルタ */}
                            <div className="flex gap-2 flex-wrap">
                                <button
                                    onClick={() => toggleStatusFilter('critical')}
                                    className={`px-2 py-1 rounded-full text-xs transition-all ${statusFilter.includes('critical') ? 'bg-red-500 text-white' : 'bg-red-500/20 text-red-400 hover:bg-red-500/30'}`}
                                >
                                    🚨 要治療
                                </button>
                                <button
                                    onClick={() => toggleStatusFilter('caution')}
                                    className={`px-2 py-1 rounded-full text-xs transition-all ${statusFilter.includes('caution') ? 'bg-amber-500 text-white' : 'bg-amber-500/20 text-amber-400 hover:bg-amber-500/30'}`}
                                >
                                    ⚠️ 要注意
                                </button>
                                <button
                                    onClick={() => toggleStatusFilter('healthy')}
                                    className={`px-2 py-1 rounded-full text-xs transition-all ${statusFilter.includes('healthy') ? 'bg-emerald-500 text-white' : 'bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30'}`}
                                >
                                    ✅ 良好
                                </button>
                            </div>

                            {/* フィルタ結果カウント + クリアボタン */}
                            <div className="flex justify-between items-center">
                                <div className="text-xs text-white/40">
                                    <span className="text-emerald-400 font-medium">{filteredStores.length}</span> / {stores.length} 店舗
                                    {prefectureFilter && <span className="ml-2 text-blue-400">({prefectureFilter})</span>}
                                </div>
                                {activeFilterCount > 0 && (
                                    <button
                                        onClick={clearAllFilters}
                                        className="text-xs px-2 py-1 rounded bg-white/10 text-white/50 hover:bg-white/20 hover:text-white/70 transition-all"
                                    >
                                        フィルタクリア ({activeFilterCount})
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-3">
                            {filteredStores.map(store => (
                                <StoreCard key={store.store_id} store={store}
                                    isSelected={viewMode === 'business' ? (chartFilter?.type === 'store' && chartFilter?.value === store.store_id) : (selectedStore?.store_id === store.store_id)}
                                    onClick={() => {
                                        if (viewMode === 'business') {
                                            // 事業全体モードではチャートフィルターに使用
                                            setChartFilter(prev =>
                                                prev.type === 'store' && prev.value === store.store_id
                                                    ? { type: null, value: null }
                                                    : { type: 'store', value: store.store_id }
                                            );
                                        } else {
                                            setSelectedStore(store);
                                        }
                                    }}
                                    analysisStatus={store.analysis_status} />
                            ))}
                            {filteredStores.length === 0 && (
                                <div className="text-center text-white/30 py-8">
                                    条件に一致する店舗がありません
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col overflow-hidden">
                        {viewMode === 'business' ? (
                            /* 事業全体ダッシュボード */
                            <BusinessOverviewDashboard
                                data={businessOverview}
                                stores={stores}
                                onStoreClick={(store) => {
                                    setSelectedStore(store);
                                }}
                                onSwitchToStore={() => setViewMode('store')}
                                chartFilter={chartFilter}
                                onFilterChange={setChartFilter}
                            />
                        ) : selectedStore ? (
                            <>
                                <div className="p-4 border-b border-white/10 flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        {/* 健康度スコア（ツールチップ付き） */}
                                        <div className="relative group cursor-help">
                                            <CircularProgress value={health.score} size={70} color={health.color} />
                                            <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                <span className="text-xl font-bold">{Math.round(health.score)}</span>
                                            </div>
                                            {/* ツールチップ（右側・上揃えで表示） */}
                                            <div className="absolute left-full top-0 ml-3 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none z-[9999]">
                                                <div className="bg-gray-900 border border-white/20 rounded-lg p-3 shadow-xl min-w-[220px]">
                                                    <div className="text-sm font-semibold text-white mb-2">📊 健康度スコア</div>
                                                    <div className="space-y-1.5 text-xs">
                                                        <div className="flex justify-between">
                                                            <span className="text-white/50">前年比 (YoY)</span>
                                                            <span className={`font-medium ${selectedStore.yoy_change >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                                                {selectedStore.yoy_change >= 0 ? '+' : ''}{(selectedStore.yoy_change * 100).toFixed(1)}%
                                                            </span>
                                                        </div>
                                                        <div className="flex justify-between">
                                                            <span className="text-white/50">スコア</span>
                                                            <span className="font-medium text-white">{Math.round(health.score)} / 100</span>
                                                        </div>
                                                        <div className="flex justify-between">
                                                            <span className="text-white/50">判定</span>
                                                            <span className={`font-medium ${health.color === 'emerald' ? 'text-emerald-400' : health.color === 'amber' ? 'text-amber-400' : 'text-red-400'}`}>{health.label}</span>
                                                        </div>
                                                    </div>
                                                    <div className="mt-2 pt-2 border-t border-white/10 text-xs text-white/40">
                                                        計算式: 50 + (YoY × 200)
                                                    </div>
                                                    {/* 矢印（左向き・上寄せ） */}
                                                    <div className="absolute -left-1.5 top-4 w-3 h-3 bg-gray-900 border-l border-b border-white/20 rotate-45"></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold">{selectedStore.store_name}</h2>
                                            <div className="text-sm text-white/50">{selectedStore.prefecture} {selectedStore.city}</div>
                                        </div>
                                        <span className={`px-3 py-1 rounded-full text-sm ${health.color === 'emerald' ? 'bg-emerald-500/20 text-emerald-400' : health.color === 'amber' ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'}`}>● {health.label}</span>
                                    </div>
                                    {analysisStatus?.status === 'completed' && (
                                        <button onClick={() => startAnalysis(true)} className="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm flex items-center gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                                                <path fillRule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1z" clipRule="evenodd" />
                                            </svg>
                                            再分析
                                        </button>
                                    )}
                                </div>

                                <div className="flex-1 overflow-hidden">
                                    {analysisStatus?.status === 'running' ? (
                                        <div className="h-full flex items-center justify-center">
                                            <div className="w-80 card p-6 rounded-xl">
                                                <div className="text-center mb-4">
                                                    <div className="font-semibold">包括的分析を実行中...</div>
                                                    <div className="text-sm text-white/50">他の店舗を閲覧可能です</div>
                                                </div>
                                                <PhaseIndicator currentPhase={analysisStatus.current_phase} progress={analysisStatus.progress || 0} />
                                            </div>
                                        </div>
                                    ) : analysisStatus?.status === 'failed' ? (
                                        <div className="h-full flex items-center justify-center">
                                            <div className="w-96 card p-6 rounded-xl border border-red-500/30">
                                                <div className="text-center mb-4">
                                                    <div className="text-4xl mb-2">⚠️</div>
                                                    <div className="font-semibold text-red-400">分析中にエラーが発生しました</div>
                                                    <div className="text-sm text-white/50 mt-2">{analysisStatus.error || '不明なエラー'}</div>
                                                </div>
                                                <button onClick={() => startAnalysis(true)} className="w-full px-4 py-2 bg-emerald-500 hover:bg-emerald-600 rounded-lg font-medium transition-colors">
                                                    再試行
                                                </button>
                                            </div>
                                        </div>
                                    ) : analysisStatus?.status === 'completed' && analysisResult ? (
                                        <div className="h-full p-6">
                                            <ReportViewer report={analysisResult.ai_report} lv1={analysisResult.lv1} lv2={analysisResult.lv2} lv3={analysisResult.lv3} />
                                        </div>
                                    ) : (
                                        <OverviewDashboard overview={overview} selectedStore={selectedStore} />
                                    )}
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 flex items-center justify-center">
                                <div className="text-center">
                                    <div className="text-6xl mb-4">🏪</div>
                                    <div className="text-xl font-semibold mb-2">店舗を選択してください</div>
                                    <div className="text-white/50">左側のリストから分析したい店舗をクリック</div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
