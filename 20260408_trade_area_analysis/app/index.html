<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AI Store Doctor | DCM商圏分析</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // marked の初期設定とフォールバック
        if (typeof marked !== 'undefined') {
            marked.setOptions({
                breaks: true,
                gfm: true,
                headerIds: false,
                mangle: false
            });
        }
        // markedが読み込まれなかった場合のフォールバック関数
        window.safeMarkdownParse = function(text) {
            if (!text) return '';
            try {
                if (typeof marked !== 'undefined' && marked.parse) {
                    return marked.parse(text);
                }
            } catch (e) {
                console.error('Marked parse error:', e);
            }
            // フォールバック: 基本的なマークダウン変換
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        };
    </script>
    <!-- Leaflet for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Outfit', 'Noto Sans JP', sans-serif; background: #0a0a0f; }
        .glow-green { box-shadow: 0 0 30px rgba(16, 185, 129, 0.3); }
        .glow-amber { box-shadow: 0 0 30px rgba(245, 158, 11, 0.3); }
        .glow-red { box-shadow: 0 0 30px rgba(239, 68, 68, 0.3); }
        @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse-glow 2s ease-in-out infinite; }
        .gradient-text { background: linear-gradient(135deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: linear-gradient(145deg, rgba(30, 30, 40, 0.8), rgba(20, 20, 30, 0.9)); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); overflow: visible; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: rotate 1s linear infinite; }
        .markdown-content h2 { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 0.75rem 0; color: #10b981; }
        .markdown-content h3 { font-size: 1.25rem; font-weight: 600; margin: 1.25rem 0 0.5rem 0; color: #60a5fa; }
        .markdown-content p { margin: 0.5rem 0; line-height: 1.7; }
        .markdown-content ul, .markdown-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .markdown-content li { margin: 0.25rem 0; }
        .markdown-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .markdown-content th, .markdown-content td { border: 1px solid rgba(255,255,255,0.1); padding: 0.5rem; text-align: left; }
        .markdown-content th { background: rgba(16, 185, 129, 0.2); }
        .markdown-content strong { color: #fbbf24; }
        /* Genie チャット用スタイル */
        .genie-response { line-height: 1.6; }
        .genie-response p { margin: 0.25rem 0; }
        .genie-response strong { color: #fbbf24; }
        .genie-response table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.8rem; }
        .genie-response th, .genie-response td { border: 1px solid rgba(255,255,255,0.15); padding: 0.4rem 0.6rem; text-align: left; }
        .genie-response th { background: rgba(16, 185, 129, 0.25); color: #10b981; font-weight: 600; }
        .genie-response tr:nth-child(even) { background: rgba(255,255,255,0.03); }
        .genie-response code { background: rgba(255,255,255,0.1); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85em; }
        .genie-response pre { background: rgba(0,0,0,0.3); padding: 0.75rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; }
        .genie-response pre code { background: none; padding: 0; }
        .genie-response details { margin: 0.5rem 0; }
        .genie-response summary { cursor: pointer; color: #60a5fa; font-size: 0.9em; }
        .genie-response summary:hover { color: #93c5fd; }
        .genie-response em { color: rgba(255,255,255,0.6); font-style: italic; }
    </style>
</head>
<body class="text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        // VERSION: 2.0 - Tooltip removed from chart, hover info in title bar
        console.log('AI Store Doctor v2.0 loaded - tooltip in title bar');
        const { useState, useEffect, useRef } = React;
        const { createPortal } = ReactDOM;

        const calculateHealth = (yoyChange) => {
            const score = Math.max(0, Math.min(100, 50 + yoyChange * 200));
            if (score >= 60) return { score, status: 'healthy', color: 'emerald', label: '良好' };
            if (score >= 40) return { score, status: 'caution', color: 'amber', label: '要注意' };
            return { score, status: 'critical', color: 'red', label: '要治療' };
        };

        const CircularProgress = ({ value, size = 80, color = 'emerald' }) => {
            const strokeWidth = 6;
            const radius = (size - strokeWidth) / 2;
            const circumference = radius * 2 * Math.PI;
            const offset = circumference - (value / 100) * circumference;
            const colors = { emerald: '#10b981', amber: '#f59e0b', red: '#ef4444', blue: '#3b82f6' };
            return (
                <svg width={size} height={size} className="transform -rotate-90">
                    <circle cx={size/2} cy={size/2} r={radius} stroke="rgba(255,255,255,0.1)" strokeWidth={strokeWidth} fill="none" />
                    <circle cx={size/2} cy={size/2} r={radius} stroke={colors[color]} strokeWidth={strokeWidth}
                        fill="none" strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset}
                        style={{ transition: 'stroke-dashoffset 0.5s ease' }} />
                </svg>
            );
        };

        const MiniChart = ({ data, width = 200, height = 60, showAxis = true }) => {
            if (!data || data.length === 0) return null;
            const values = data.map(d => d.sales);
            const max = Math.max(...values);
            const min = Math.min(...values);
            const range = max - min || 1;
            const padding = 5;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;

            const points = data.map((d, i) => {
                const x = padding + (i / (data.length - 1)) * chartWidth;
                const y = padding + chartHeight - ((d.sales - min) / range) * chartHeight;
                return { x, y, ...d };
            });

            const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            const areaD = pathD + ` L ${points[points.length-1].x} ${height - padding} L ${padding} ${height - padding} Z`;

            return (
                <svg width={width} height={height}>
                    <defs>
                        <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.3" />
                            <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
                        </linearGradient>
                    </defs>
                    <path d={areaD} fill="url(#chartGradient)" />
                    <path d={pathD} fill="none" stroke="#3b82f6" strokeWidth="2" />
                    {points.map((p, i) => (
                        <circle key={i} cx={p.x} cy={p.y} r="3" fill="#3b82f6" />
                    ))}
                </svg>
            );
        };

        const BarChart = ({ data, width = 200, height = 120 }) => {
            if (!data || data.length === 0) return null;
            const max = Math.max(...data.map(d => d.sales_man));
            const barWidth = (width - 20) / data.length - 4;

            return (
                <svg width={width} height={height}>
                    {data.map((d, i) => {
                        const barHeight = (d.sales_man / max) * (height - 30);
                        const x = 10 + i * (barWidth + 4);
                        const y = height - 20 - barHeight;
                        return (
                            <g key={i}>
                                <rect x={x} y={y} width={barWidth} height={barHeight} fill="#10b981" rx="2" />
                                <text x={x + barWidth/2} y={height - 5} textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize="8">
                                    {d.category.slice(0, 4)}
                                </text>
                            </g>
                        );
                    })}
                </svg>
            );
        };

        const StoreCard = ({ store, isSelected, onClick, analysisStatus }) => {
            const health = calculateHealth(store.yoy_change);
            const glowClass = health.color === 'emerald' ? 'hover:glow-green' : health.color === 'amber' ? 'hover:glow-amber' : 'hover:glow-red';
            return (
                <div onClick={onClick} className={`card rounded-xl p-4 cursor-pointer transition-all duration-300 ${glowClass} ${isSelected ? 'ring-2 ring-emerald-500' : ''}`}>
                    <div className="flex items-center gap-4">
                        {/* 健康度スコア（ツールチップ付き） */}
                        <div className="relative group"
                            onClick={(e) => e.stopPropagation()}
                            onMouseEnter={(e) => e.stopPropagation()}
                        >
                            <CircularProgress value={health.score} size={60} color={health.color} />
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                <span className="text-lg font-bold">{Math.round(health.score)}</span>
                            </div>
                            {/* ツールチップ（右側に表示） */}
                            <div className="absolute left-full top-0 ml-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none z-[9999]">
                                <div className="bg-gray-900 border border-white/20 rounded-lg p-3 shadow-xl min-w-[200px]">
                                    <div className="text-sm font-semibold text-white mb-2">📊 健康度スコア</div>
                                    <div className="space-y-1.5 text-xs">
                                        <div className="flex justify-between">
                                            <span className="text-white/50">前年比 (YoY)</span>
                                            <span className={`font-medium ${store.yoy_change >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                                {store.yoy_change >= 0 ? '+' : ''}{(store.yoy_change * 100).toFixed(1)}%
                                            </span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-white/50">スコア</span>
                                            <span className="font-medium text-white">{Math.round(health.score)} / 100</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-white/50">判定</span>
                                            <span className={`font-medium ${health.color === 'emerald' ? 'text-emerald-400' : health.color === 'amber' ? 'text-amber-400' : 'text-red-400'}`}>{health.label}</span>
                                        </div>
                                    </div>
                                    <div className="mt-2 pt-2 border-t border-white/10 text-xs text-white/40">
                                        計算式: 50 + (YoY × 200)
                                    </div>
                                    {/* 矢印（左向き・上寄せ） */}
                                    <div className="absolute -left-1.5 top-4 w-3 h-3 bg-gray-900 border-l border-b border-white/20 rotate-45"></div>
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 min-w-0">
                            <div className="font-semibold truncate">{store.store_name}</div>
                            <div className="text-sm text-white/50">{store.prefecture} {store.city}</div>
                            <div className="flex items-center gap-2 mt-1">
                                <span className={`text-xs px-2 py-0.5 rounded-full ${health.color === 'emerald' ? 'bg-emerald-500/20 text-emerald-400' : health.color === 'amber' ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400'}`}>
                                    {health.label}
                                </span>
                                {analysisStatus === 'completed' && <span className="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded">分析済</span>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PhaseIndicator = ({ currentPhase, progress }) => {
            const phases = [
                { id: 'lv1', label: 'Lv1 基礎分析' },
                { id: 'lv2', label: 'Lv2 深掘分析' },
                { id: 'lv3', label: 'Lv3 施策立案' },
                { id: 'ai_synthesis', label: 'AI総合診断' }
            ];
            const currentIdx = phases.findIndex(p => p.id === currentPhase);
            return (
                <div className="space-y-3">
                    {phases.map((phase, idx) => (
                        <div key={phase.id} className={`flex items-center gap-3 p-2 rounded-lg ${idx === currentIdx ? 'bg-emerald-500/20' : idx < currentIdx ? 'bg-white/5' : 'opacity-40'}`}>
                            <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${idx < currentIdx ? 'bg-emerald-500' : idx === currentIdx ? 'bg-emerald-500/50 pulse' : 'bg-white/10'}`}>
                                {idx < currentIdx ? '✓' : idx + 1}
                            </div>
                            <span className="text-sm">{phase.label}</span>
                            {idx === currentIdx && <div className="spinner w-4 h-4 border-2 border-emerald-500 border-t-transparent rounded-full ml-auto" />}
                        </div>
                    ))}
                    <div className="h-2 bg-white/10 rounded-full overflow-hidden mt-3">
                        <div className="h-full bg-gradient-to-r from-emerald-500 to-blue-500 transition-all" style={{ width: `${progress}%` }} />
                    </div>
                </div>
            );
        };

        // マップコンポーネント（トグル機能付き）
        const StoreMap = ({ lat, lng, storeName, competitors, facilities }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef({ competitors: [], facilities: [] });
            const [showCompetitors, setShowCompetitors] = useState(true);
            const [showFacilities, setShowFacilities] = useState(false);
            const storeLatRef = useRef(null);
            const storeLngRef = useRef(null);

            // 施設タイプ別のアイコン設定
            const facilityIcons = {
                station: { color: '#f59e0b', icon: '🚃', label: '駅' },
                school: { color: '#3b82f6', icon: '🏫', label: '学校' },
                hospital: { color: '#ef4444', icon: '🏥', label: '病院' },
                park: { color: '#22c55e', icon: '🌳', label: '公園' },
                commercial: { color: '#ec4899', icon: '🏬', label: '商業' },
                supermarket: { color: '#14b8a6', icon: '🛒', label: 'スーパー' },
                convenience: { color: '#06b6d4', icon: '🏪', label: 'コンビニ' },
                government: { color: '#64748b', icon: '🏛️', label: '行政' },
                bank: { color: '#6366f1', icon: '🏦', label: '銀行' },
                post: { color: '#f97316', icon: '📮', label: '郵便局' },
                other: { color: '#94a3b8', icon: '📍', label: '施設' }
            };

            // マップ初期化
            useEffect(() => {
                if (!mapRef.current) return;

                // 既存のマップがあれば削除
                if (mapInstanceRef.current) {
                    mapInstanceRef.current.remove();
                    mapInstanceRef.current = null;
                }

                const storeLat = lat || 35.6595;
                const storeLng = lng || 139.7004;
                storeLatRef.current = storeLat;
                storeLngRef.current = storeLng;

                const map = L.map(mapRef.current, {
                    zoomControl: false,
                    attributionControl: false,
                    preferCanvas: true  // パフォーマンス向上
                }).setView([storeLat, storeLng], 14);

                // OpenStreetMapを使用（より安定）
                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: ''
                }).addTo(map);

                // 当店舗マーカー
                const storeIcon = L.divIcon({
                    className: 'custom-marker',
                    html: '<div style="background: #10b981; width: 28px; height: 28px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 12px rgba(16,185,129,0.5); display:flex; align-items:center; justify-content:center; font-size:14px;">🏠</div>',
                    iconSize: [28, 28],
                    iconAnchor: [14, 14]
                });
                const storeMarker = L.marker([storeLat, storeLng], { icon: storeIcon }).addTo(map);
                storeMarker.bindPopup(`<div style="font-family:sans-serif;"><b style="color:#10b981;font-size:14px;">${storeName}</b><br/><span style="color:#666;">当店舗</span></div>`);
                storeMarker.on('mouseover', function() { this.openPopup(); });

                // 5km圏円
                L.circle([storeLat, storeLng], {
                    radius: 5000,
                    color: '#10b981',
                    fillColor: '#10b981',
                    fillOpacity: 0.08,
                    weight: 2,
                    dashArray: '5, 5'
                }).addTo(map);

                // 3km圏円
                L.circle([storeLat, storeLng], {
                    radius: 3000,
                    color: '#3b82f6',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.05,
                    weight: 1,
                    dashArray: '3, 3'
                }).addTo(map);

                mapInstanceRef.current = map;

                // サイズ調整を遅延実行（タイル読み込み安定化）
                setTimeout(() => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.invalidateSize();
                    }
                }, 100);
                setTimeout(() => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.invalidateSize();
                    }
                }, 500);

                // ResizeObserverでコンテナサイズ変更を監視
                const resizeObserver = new ResizeObserver(() => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.invalidateSize();
                    }
                });
                resizeObserver.observe(mapRef.current);

                return () => {
                    resizeObserver.disconnect();
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, [storeName]);

            // 競合マーカーの更新
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                // 既存の競合マーカーを削除
                markersRef.current.competitors.forEach(m => map.removeLayer(m));
                markersRef.current.competitors = [];

                if (showCompetitors && competitors) {
                    const storeLat = storeLatRef.current;
                    const storeLng = storeLngRef.current;

                    competitors.forEach((c, i) => {
                        const angle = (i / competitors.length) * Math.PI * 2 + 0.5;
                        const dist = c.distance_km * 0.009;
                        const markerLat = storeLat + Math.cos(angle) * dist;
                        const markerLng = storeLng + Math.sin(angle) * dist * 1.2;

                        const color = c.is_new_entry ? '#ef4444' : '#6b7280';
                        const icon = L.divIcon({
                            className: 'custom-marker',
                            html: `<div style="background:${color}; width:20px; height:20px; border-radius:50%; border:2px solid white; box-shadow:0 2px 6px rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; font-size:10px;">🏪</div>`,
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        });

                        const marker = L.marker([markerLat, markerLng], { icon }).addTo(map);
                        const popupContent = `
                            <div style="font-family:sans-serif; min-width:140px;">
                                <b style="color:${color}; font-size:13px;">${c.name}</b>
                                ${c.is_new_entry ? '<span style="background:#ef4444; color:white; padding:1px 6px; border-radius:4px; font-size:10px; margin-left:6px;">NEW</span>' : ''}
                                <div style="margin-top:6px; font-size:11px; color:#666;">
                                    <div>📍 距離: <b>${c.distance_km}km</b></div>
                                    <div>📐 売場: <b>${c.size_sqm?.toLocaleString()}㎡</b></div>
                                </div>
                            </div>
                        `;
                        marker.bindPopup(popupContent);
                        marker.on('mouseover', function() { this.openPopup(); });
                        markersRef.current.competitors.push(marker);
                    });
                }
            }, [showCompetitors, competitors]);

            // 施設マーカーの更新
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;

                // 既存の施設マーカーを削除
                markersRef.current.facilities.forEach(m => map.removeLayer(m));
                markersRef.current.facilities = [];

                if (showFacilities && facilities) {
                    const storeLat = storeLatRef.current;
                    const storeLng = storeLngRef.current;

                    facilities.forEach((f, i) => {
                        const angle = (i / facilities.length) * Math.PI * 2;
                        const dist = f.distance_km * 0.009;
                        const markerLat = storeLat + Math.cos(angle) * dist;
                        const markerLng = storeLng + Math.sin(angle) * dist * 1.2;

                        const typeInfo = facilityIcons[f.type] || { color: '#94a3b8', icon: '📍', label: '施設' };
                        const icon = L.divIcon({
                            className: 'custom-marker',
                            html: `<div style="background:${typeInfo.color}; width:22px; height:22px; border-radius:6px; border:2px solid white; box-shadow:0 2px 6px rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; font-size:12px;">${typeInfo.icon}</div>`,
                            iconSize: [22, 22],
                            iconAnchor: [11, 11]
                        });

                        const marker = L.marker([markerLat, markerLng], { icon }).addTo(map);

                        // 施設の詳細情報（DBからの実データ対応）
                        const labelText = f.type_label || typeInfo.label;
                        let details = `📍 距離: <b>${f.distance_km}km</b>`;
                        if (f.traffic_impact) details += `<br/>📊 集客影響: <b>${(f.traffic_impact * 100).toFixed(0)}%</b>`;
                        if (f.daily_passengers) details += `<br/>👥 乗降客: <b>${(f.daily_passengers/10000).toFixed(1)}万人/日</b>`;
                        if (f.area_sqm) details += `<br/>📐 面積: <b>${(f.area_sqm/10000).toFixed(1)}万㎡</b>`;

                        const popupContent = `
                            <div style="font-family:sans-serif; min-width:140px;">
                                <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
                                    <span style="background:${typeInfo.color}; padding:2px 8px; border-radius:4px; font-size:10px; color:white;">${labelText}</span>
                                    <b style="font-size:13px;">${f.name}</b>
                                </div>
                                <div style="font-size:11px; color:#666;">${details}</div>
                            </div>
                        `;
                        marker.bindPopup(popupContent);
                        marker.on('mouseover', function() { this.openPopup(); });
                        markersRef.current.facilities.push(marker);
                    });
                }
            }, [showFacilities, facilities]);

            return (
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                    {/* トグルボタン - インラインスタイルで確実に表示 */}
                    <div style={{
                        position: 'absolute',
                        top: '8px',
                        left: '8px',
                        zIndex: 9999,
                        display: 'flex',
                        gap: '4px',
                        pointerEvents: 'auto'
                    }}>
                        <button
                            onClick={() => setShowCompetitors(!showCompetitors)}
                            style={{
                                padding: '6px 10px',
                                borderRadius: '6px',
                                fontSize: '12px',
                                fontWeight: '600',
                                border: 'none',
                                cursor: 'pointer',
                                display: 'flex',
                                alignItems: 'center',
                                gap: '4px',
                                background: showCompetitors ? '#4b5563' : 'rgba(0,0,0,0.7)',
                                color: 'white',
                                boxShadow: '0 2px 8px rgba(0,0,0,0.3)'
                            }}
                        >
                            🏪 競合 {competitors?.length || 0}
                        </button>
                        <button
                            onClick={() => setShowFacilities(!showFacilities)}
                            style={{
                                padding: '6px 10px',
                                borderRadius: '6px',
                                fontSize: '12px',
                                fontWeight: '600',
                                border: 'none',
                                cursor: 'pointer',
                                display: 'flex',
                                alignItems: 'center',
                                gap: '4px',
                                background: showFacilities ? '#d97706' : 'rgba(0,0,0,0.7)',
                                color: 'white',
                                boxShadow: '0 2px 8px rgba(0,0,0,0.3)'
                            }}
                        >
                            🏢 施設 {facilities?.length || 0}
                        </button>
                    </div>
                    {/* 距離凡例 */}
                    <div style={{
                        position: 'absolute',
                        bottom: '8px',
                        left: '8px',
                        zIndex: 9999,
                        background: 'rgba(0,0,0,0.7)',
                        borderRadius: '4px',
                        padding: '4px 8px',
                        fontSize: '11px',
                        color: 'white'
                    }}>
                        <span style={{ color: '#60a5fa' }}>● 3km</span>
                        <span style={{ color: '#34d399', marginLeft: '8px' }}>● 5km</span>
                    </div>
                    <div ref={mapRef} className="w-full h-full rounded-lg" />
                </div>
            );
        };

        // スパークライン（小さい折れ線）
        const Sparkline = ({ data, width = 80, height = 30, color = '#10b981' }) => {
            if (!data || data.length < 2) return null;
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            const points = data.map((v, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((v - min) / range) * height;
                return `${x},${y}`;
            }).join(' ');
            return (
                <svg width={width} height={height} className="inline-block">
                    <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        };

        // シンプルな折れ線グラフ（直近12ヶ月、ポップアップツールチップ付き）
        const DetailedLineChart = ({ data, storeInfo }) => {
            const containerRef = useRef(null);
            const [dimensions, setDimensions] = useState({ width: 400, height: 120 });
            const [tooltip, setTooltip] = useState(null);

            useEffect(() => {
                if (containerRef.current) {
                    const resizeObserver = new ResizeObserver(entries => {
                        for (let entry of entries) {
                            setDimensions({
                                width: entry.contentRect.width,
                                height: 120
                            });
                        }
                    });
                    resizeObserver.observe(containerRef.current);
                    return () => resizeObserver.disconnect();
                }
            }, []);

            if (!data || data.length === 0) return <div ref={containerRef} style={{ height: 120 }} />;

            const { width, height } = dimensions;
            const chartData = data.slice(-12);
            const values = chartData.map(d => d.sales);
            const max = Math.max(...values);
            const min = Math.min(...values);
            const range = max - min || 1;
            const padding = { top: 15, right: 20, bottom: 25, left: 50 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            const points = chartData.map((d, i) => ({
                x: padding.left + (i / Math.max(chartData.length - 1, 1)) * chartWidth,
                y: padding.top + chartHeight - ((d.sales - min) / range) * chartHeight,
                ...d
            }));

            const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            const areaD = pathD + ` L ${points[points.length-1].x} ${padding.top + chartHeight} L ${padding.left} ${padding.top + chartHeight} Z`;

            const yTicks = [0, 0.5, 1].map(t => ({
                y: padding.top + chartHeight * (1 - t),
                value: Math.round(min + range * t)
            }));

            const handleMouseEnter = (p, e) => {
                setTooltip({ x: e.clientX, y: e.clientY, data: p });
            };
            const handleMouseLeave = () => {
                setTooltip(null);
            };

            // ツールチップをdocument.bodyにPortalでレンダリング
            const tooltipElement = tooltip && createPortal(
                <div style={{
                    position: 'fixed',
                    left: tooltip.x + 15,
                    top: tooltip.y - 10,
                    transform: 'translateY(-100%)',
                    background: 'rgba(15, 23, 42, 0.98)',
                    border: '1px solid rgba(59, 130, 246, 0.5)',
                    borderRadius: '8px',
                    padding: '10px 12px',
                    fontSize: '12px',
                    color: 'white',
                    boxShadow: '0 8px 32px rgba(0,0,0,0.6)',
                    zIndex: 999999,
                    minWidth: '180px',
                    pointerEvents: 'none'
                }}>
                    <div style={{ fontWeight: 600, marginBottom: '8px', color: '#3b82f6', borderBottom: '1px solid rgba(255,255,255,0.1)', paddingBottom: '6px' }}>
                        📍 {storeInfo?.prefecture} {storeInfo?.city}
                    </div>
                    <div style={{ marginBottom: '4px', fontWeight: 500 }}>🏪 {storeInfo?.store_name}</div>
                    <div style={{ marginTop: '8px', borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: '8px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '3px' }}>
                            <span style={{ color: 'rgba(255,255,255,0.5)' }}>📅 売上月</span>
                            <span style={{ fontWeight: 500 }}>{tooltip.data.month}</span>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '3px' }}>
                            <span style={{ color: 'rgba(255,255,255,0.5)' }}>💰 売上金額</span>
                            <span style={{ fontWeight: 600, color: '#3b82f6' }}>{(tooltip.data.sales / 10000).toLocaleString()}万円</span>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '3px' }}>
                            <span style={{ color: 'rgba(255,255,255,0.5)' }}>📈 前年比</span>
                            <span style={{ fontWeight: 500, color: (tooltip.data.yoy_change || 0) >= 0 ? '#10b981' : '#ef4444' }}>
                                {((tooltip.data.yoy_change || 0) * 100).toFixed(1)}%
                            </span>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                            <span style={{ color: 'rgba(255,255,255,0.5)' }}>👥 来店客数</span>
                            <span style={{ fontWeight: 500 }}>{(tooltip.data.customers || 0).toLocaleString()}人</span>
                        </div>
                    </div>
                </div>,
                document.body
            );

            return (
                <div ref={containerRef} style={{ width: '100%', height, position: 'relative' }}>
                    <svg width={width} height={height}>
                        <defs>
                            <linearGradient id="areaGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.3" />
                                <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
                            </linearGradient>
                        </defs>

                        {yTicks.map((tick, i) => (
                            <g key={i}>
                                <line x1={padding.left} y1={tick.y} x2={width - padding.right} y2={tick.y} stroke="rgba(255,255,255,0.06)" />
                                <text x={padding.left - 8} y={tick.y + 4} textAnchor="end" fill="rgba(255,255,255,0.4)" fontSize="10">
                                    {(tick.value / 10000).toFixed(0)}万
                                </text>
                            </g>
                        ))}

                        <path d={areaD} fill="url(#areaGradient2)" />
                        <path d={pathD} fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />

                        {points.map((p, i) => {
                            const yoy = p.yoy_change || 0;
                            const pointColor = yoy >= 0 ? '#10b981' : '#ef4444';
                            return (
                                <g key={i}>
                                    <circle
                                        cx={p.x} cy={p.y} r="5" fill={pointColor} stroke="white" strokeWidth="2"
                                        style={{ cursor: 'pointer', transition: 'r 0.15s' }}
                                        onMouseEnter={(e) => handleMouseEnter(p, e)}
                                        onMouseLeave={handleMouseLeave}
                                    />
                                    {(i % 2 === 0 || i === points.length - 1) && (
                                        <text x={p.x} y={height - 6} textAnchor="middle" fill="rgba(255,255,255,0.4)" fontSize="9">
                                            {p.month?.slice(5, 7)}月
                                        </text>
                                    )}
                                </g>
                            );
                        })}
                    </svg>
                    {tooltipElement}
                </div>
            );
        };

        // 水平バーチャート（ツールチップ付き）
        const HorizontalBarChart = ({ data, storeInfo, totalSales }) => {
            const [tooltip, setTooltip] = useState(null);
            const containerRef = useRef(null);

            if (!data || data.length === 0) return null;
            const max = Math.max(...data.map(d => d.sales_man));
            const total = totalSales || data.reduce((sum, d) => sum + d.sales_man, 0);

            const handleMouseEnter = (d, e) => {
                const rect = containerRef.current.getBoundingClientRect();
                setTooltip({
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top,
                    data: d,
                    share: ((d.sales_man / total) * 100).toFixed(1),
                    rank: data.indexOf(d) + 1
                });
            };

            return (
                <div ref={containerRef} className="space-y-2" style={{ position: 'relative' }}>
                    {data.map((d, i) => (
                        <div
                            key={i}
                            className="flex items-center gap-2 cursor-pointer group"
                            onMouseEnter={(e) => handleMouseEnter(d, e)}
                            onMouseLeave={() => setTooltip(null)}
                        >
                            <div className="w-20 text-xs text-white/60 truncate group-hover:text-white/90 transition-colors">{d.category}</div>
                            <div className="flex-1 h-5 bg-white/5 rounded overflow-hidden relative group-hover:bg-white/10 transition-colors">
                                <div
                                    className="h-full bg-gradient-to-r from-emerald-500 to-emerald-400 rounded transition-all group-hover:from-emerald-400 group-hover:to-emerald-300"
                                    style={{ width: `${(d.sales_man / max) * 100}%` }}
                                />
                                <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-medium">
                                    {d.sales_man.toLocaleString()}万
                                </span>
                            </div>
                        </div>
                    ))}

                    {/* ツールチップ */}
                    {tooltip && (
                        <div style={{
                            position: 'absolute',
                            left: Math.min(tooltip.x + 10, 200),
                            top: tooltip.y - 80,
                            background: 'rgba(15, 23, 42, 0.95)',
                            border: '1px solid rgba(16, 185, 129, 0.5)',
                            borderRadius: '8px',
                            padding: '10px 12px',
                            fontSize: '12px',
                            color: 'white',
                            boxShadow: '0 4px 20px rgba(0,0,0,0.4)',
                            zIndex: 1000,
                            minWidth: '160px',
                            pointerEvents: 'none'
                        }}>
                            <div style={{ fontWeight: 600, marginBottom: '8px', color: '#10b981', borderBottom: '1px solid rgba(255,255,255,0.1)', paddingBottom: '6px' }}>
                                🏆 {tooltip.data.category}
                            </div>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '4px' }}>
                                <span style={{ color: 'rgba(255,255,255,0.5)' }}>💰 売上金額</span>
                                <span style={{ fontWeight: 600, color: '#10b981' }}>{tooltip.data.sales_man.toLocaleString()}万円</span>
                            </div>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '4px' }}>
                                <span style={{ color: 'rgba(255,255,255,0.5)' }}>📊 売上構成比</span>
                                <span style={{ fontWeight: 500 }}>{tooltip.share}%</span>
                            </div>
                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ color: 'rgba(255,255,255,0.5)' }}>🥇 ランキング</span>
                                <span style={{ fontWeight: 500 }}>第{tooltip.rank}位 / {data.length}カテゴリ</span>
                            </div>
                            {storeInfo && (
                                <div style={{ marginTop: '8px', paddingTop: '8px', borderTop: '1px solid rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.4)', fontSize: '10px' }}>
                                    🏪 {storeInfo.store_name}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const OverviewDashboard = ({ overview, selectedStore }) => {
            const store = overview?.store;
            const chain_avg = overview?.chain_avg;
            const demographics = overview?.demographics;
            const competitors = overview?.competitors;
            const facilities = overview?.facilities;
            const top_categories = overview?.top_categories;
            const monthly_trend = overview?.monthly_trend;

            const yoyDiff = (store?.avg_yoy_pct || 0) - (chain_avg?.avg_yoy_pct || 0);
            const salesTrend = monthly_trend?.map(d => d.sales) || [];
            const customerTrend = monthly_trend?.map(d => d.customers) || [];

            // データがまだない場合
            if (!store) {
                return (
                    <div className="h-full flex items-center justify-center">
                        <div className="text-center text-white/40">
                            <div className="spinner w-8 h-8 border-2 border-emerald-500 border-t-transparent rounded-full mx-auto mb-3" />
                            店舗データを読み込み中...
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-full overflow-y-auto p-5 space-y-3">
                    {/* Row 1: コンパクトKPIカード */}
                    <div className="grid grid-cols-5 gap-2">
                        <div className="card p-3 rounded-xl">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-white/50 text-xs">年間売上</span>
                                <Sparkline data={salesTrend} width={40} height={16} color="#10b981" />
                            </div>
                            <div className="text-xl font-bold">{store?.annual_sales_man?.toLocaleString()}<span className="text-xs font-normal text-white/50 ml-1">万円</span></div>
                        </div>
                        <div className="card p-3 rounded-xl">
                            <div className="text-white/50 text-xs mb-1">前年比</div>
                            <div className={`text-xl font-bold ${store?.avg_yoy_pct >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                {store?.avg_yoy_pct >= 0 ? '+' : ''}{store?.avg_yoy_pct?.toFixed(1)}%
                            </div>
                        </div>
                        <div className="card p-3 rounded-xl">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-white/50 text-xs">月間来店</span>
                                <Sparkline data={customerTrend} width={40} height={16} color="#3b82f6" />
                            </div>
                            <div className="text-xl font-bold">{store?.avg_monthly_customers?.toLocaleString()}<span className="text-xs font-normal text-white/50 ml-1">人</span></div>
                        </div>
                        <div className="card p-3 rounded-xl">
                            <div className="text-white/50 text-xs mb-1">客単価</div>
                            <div className="text-xl font-bold">{store?.avg_basket?.toLocaleString()}<span className="text-xs font-normal text-white/50 ml-1">円</span></div>
                        </div>
                        <div className="card p-3 rounded-xl">
                            <div className="text-white/50 text-xs mb-1">売場効率</div>
                            <div className="text-xl font-bold">{store?.size_sqm ? Math.round((store.annual_sales_man * 10000) / store.size_sqm).toLocaleString() : '-'}<span className="text-xs font-normal text-white/50 ml-1">円/㎡</span></div>
                        </div>
                    </div>

                    {/* Row 2: メインコンテンツ - 左側データ、右側大きなマップ */}
                    <div className="grid grid-cols-12 gap-3" style={{ minHeight: '420px' }}>
                        {/* 左側: チャート + カテゴリ + 商圏 */}
                        <div className="col-span-7 flex flex-col gap-3">
                            {/* チャート */}
                            <div className="card p-4 rounded-xl">
                                <div className="flex justify-between items-center mb-2">
                                    <div className="text-white/70 text-sm font-medium">📈 月次売上推移</div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs text-white/40">直近12ヶ月</span>
                                        <div className="flex items-center gap-1">
                                            <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
                                            <span className="text-xs text-white/40">YoY+</span>
                                            <span className="w-2 h-2 rounded-full bg-red-500 ml-2"></span>
                                            <span className="text-xs text-white/40">YoY-</span>
                                        </div>
                                    </div>
                                </div>
                                <DetailedLineChart data={monthly_trend} storeInfo={store} />
                            </div>

                            {/* カテゴリ + 商圏プロファイル - flex-1で残りスペースを埋める */}
                            <div className="grid grid-cols-2 gap-3 flex-1">
                                <div className="card p-3 rounded-xl flex flex-col">
                                    <div className="text-white/70 text-sm font-medium mb-2">🏆 カテゴリ別売上</div>
                                    <HorizontalBarChart data={top_categories} storeInfo={store} totalSales={store?.annual_sales_man} />
                                </div>
                                <div className="card p-3 rounded-xl flex flex-col justify-between">
                                    <div>
                                        <div className="text-white/70 text-sm font-medium mb-3">👥 商圏プロファイル</div>
                                        <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-sm">
                                            <div className="flex justify-between">
                                                <span className="text-white/40">人口</span>
                                                <span className="font-medium text-emerald-400">{demographics?.population_5km?.toLocaleString()}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-white/40">世帯</span>
                                                <span className="font-medium">{demographics?.households?.toLocaleString()}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-white/40">平均年収</span>
                                                <span className="font-medium">{Math.floor((demographics?.avg_income || 0) / 10000)}万</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-white/40">高齢化率</span>
                                                <span className={`font-medium ${demographics?.elderly_rate > 0.25 ? 'text-amber-400' : ''}`}>
                                                    {((demographics?.elderly_rate || 0) * 100).toFixed(0)}%
                                                </span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-white/40">若年層率</span>
                                                <span className="font-medium">{((demographics?.young_adult_rate || 0) * 100).toFixed(0)}%</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-white/40">戸建率</span>
                                                <span className="font-medium">{((demographics?.detached_house_rate || 0) * 100).toFixed(0)}%</span>
                                            </div>
                                        </div>
                                    </div>
                                    {/* 店舗スペック - 下部に配置 */}
                                    <div className="border-t border-white/10 mt-3 pt-3">
                                        <div className="text-white/50 text-xs mb-2">🏬 店舗スペック</div>
                                        <div className="grid grid-cols-3 gap-2 text-center">
                                            <div>
                                                <div className="text-lg font-bold text-blue-400">{store?.size_sqm?.toLocaleString()}</div>
                                                <div className="text-xs text-white/40">売場㎡</div>
                                            </div>
                                            <div>
                                                <div className="text-lg font-bold text-purple-400">{store?.parking_capacity}</div>
                                                <div className="text-xs text-white/40">駐車場台</div>
                                            </div>
                                            <div>
                                                <div className="text-lg font-bold text-amber-400">{store?.store_type || '-'}</div>
                                                <div className="text-xs text-white/40">タイプ</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 右側: 大きなマップ + 競合/施設リスト */}
                        <div className="col-span-5 card p-4 rounded-xl flex flex-col">
                            <div className="flex justify-between items-center mb-2">
                                <div className="text-white/70 text-sm font-medium">📍 商圏マップ</div>
                                <div className="text-xs text-white/40">ボタンで表示切替 / マウスオーバーで詳細</div>
                            </div>
                            {/* マップ領域 - 大きく */}
                            <div className="flex-1 rounded-lg overflow-hidden mb-3" style={{ minHeight: '280px' }}>
                                <StoreMap
                                    lat={selectedStore?.latitude}
                                    lng={selectedStore?.longitude}
                                    storeName={store?.store_name}
                                    competitors={competitors}
                                    facilities={facilities}
                                />
                            </div>
                            {/* 競合リスト - マップカード内 */}
                            <div className="border-t border-white/10 pt-3">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-white/60 text-xs font-medium">🏪 近隣競合店舗</span>
                                    <span className="text-xs text-white/40">{competitors?.length || 0}店舗</span>
                                </div>
                                <div className="grid grid-cols-2 gap-2 max-h-20 overflow-y-auto">
                                    {competitors?.map((c, i) => (
                                        <div key={i} className="flex items-center justify-between text-xs p-1.5 bg-white/5 rounded">
                                            <div className="flex items-center gap-1.5">
                                                <div className={`w-1.5 h-1.5 rounded-full ${c.is_new_entry ? 'bg-red-400' : 'bg-gray-400'}`} />
                                                <span className="truncate max-w-[80px]">{c.name}</span>
                                            </div>
                                            <span className="text-white/40">{c.distance_km}km</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Row 3: Genieチャット（全幅） */}
                    <div className="card p-4 rounded-xl border border-emerald-500/30" style={{ minHeight: '280px' }}>
                        <GenieChat storeContext={{
                            store_id: store?.store_id,
                            store_name: store?.store_name,
                            prefecture: store?.prefecture,
                            city: store?.city,
                            yoy_change: store?.avg_yoy_pct ? store.avg_yoy_pct / 100 : 0
                        }} />
                    </div>
                </div>
            );
        };

        const ReportViewer = ({ report, lv1, lv2, lv3 }) => {

                            <div className="card p-4 rounded-lg"><div className="text-sm text-white/50 mb-2">前年比</div><div className={`text-2xl font-bold ${store.avg_yoy_pct >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{store.avg_yoy_pct >= 0 ? '+' : ''}{store.avg_yoy_pct?.toFixed(1)}%</div></div>

            const renderLv2 = () => {

                        <div className="card p-4 rounded-lg">

                            <div className="space-y-2">
                                {cats.map((c, i) => (
                                    <div key={i} className="flex items-center gap-3 text-sm">
                                        <div className="w-28 truncate">{c.category}</div>
                                        <div className="flex-1 h-2 bg-white/10 rounded-full overflow-hidden relative">
                                            <div className={`absolute h-full ${c.gap >= 0 ? 'bg-emerald-500 left-1/2' : 'bg-red-500 right-1/2'}`} style={{ width: `${Math.min(50, Math.abs(c.gap_pct || 0) / 2)}%` }} />
                                        </div>
                                        <div className={`w-16 text-right ${c.gap >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{c.gap >= 0 ? '+' : ''}{c.gap}万</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderLv3 = () => {
                if (!lv3) return <div className="text-white/50">データなし</div>;
                const similar = lv3.similar_stores || [];
                const measures = lv3.measures || [];
                return (
                    <div className="space-y-6">
                        <div className="card p-4 rounded-lg">
                            <div className="text-lg font-semibold mb-3">類似店舗ベンチマーク</div>
                            <div className="space-y-2">
                                {similar.map((s, i) => (
                                    <div key={i} className="flex justify-between text-sm p-3 bg-white/5 rounded">
                                        <div><div className="font-medium">{s.store_name}</div><div className="text-xs text-white/50">{s.location}</div></div>
                                        <div className={`text-lg font-bold ${s.yoy_pct >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{s.yoy_pct >= 0 ? '+' : ''}{s.yoy_pct?.toFixed(1)}%</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="card p-4 rounded-lg">
                            <div className="text-lg font-semibold mb-3">過去施策</div>
                            {measures.length > 0 ? measures.map((m, i) => (
                                <div key={i} className="p-3 bg-white/5 rounded mb-2">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className={`text-xs px-2 py-0.5 rounded ${m.status === '完了' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-blue-500/20 text-blue-400'}`}>{m.status}</span>
                                        <span className="font-medium">{m.type}</span>
                                    </div>
                                    <div className="text-sm text-white/70">{m.description}</div>

                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col">
                    <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap ${activeTab === tab.id ? 'bg-emerald-500 text-white' : 'bg-white/10 text-white/70 hover:bg-white/20'}`}>{tab.label}</button>
                        ))}
                    </div>
                    <div className="flex-1 overflow-y-auto pr-2">
                        {activeTab === 'ai' && <div className="markdown-content" dangerouslySetInnerHTML={renderMarkdown(report)} />}
                        {activeTab === 'lv1' && renderLv1()}
                        {activeTab === 'lv2' && renderLv2()}
